<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OrganicFlow | Whitepapers & Tests</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Inter:wght@100..900&family=Space+Grotesk:wght@300..700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="pages/shared.css"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface": "#fcf9f0",
          "on-secondary": "#ffffff",
          "tertiary": "#1b321f",
          "surface-tint": "#486646",
          "inverse-surface": "#31312b",
          "secondary-fixed-dim": "#abd0aa",
          "tertiary-container": "#314934",
          "primary-fixed": "#c9ecc4",
          "secondary": "#456647",
          "outline-variant": "#c3c8be",
          "on-error-container": "#93000a",
          "on-tertiary-fixed": "#09200f",
          "primary": "#173318",
          "background": "#fcf9f0",
          "surface-variant": "#e5e2da",
          "on-background": "#1c1c17",
          "surface-container": "#f1eee5",
          "inverse-on-surface": "#f4f1e8",
          "outline": "#737970",
          "primary-fixed-dim": "#aecfa9",
          "tertiary-fixed": "#ceeacd",
          "on-surface-variant": "#434841",
          "error": "#ba1a1a",
          "surface-container-lowest": "#ffffff",
          "on-primary-fixed": "#042108",
          "secondary-container": "#c4e9c2",
          "surface-container-low": "#f6f3ea",
          "on-error": "#ffffff",
          "on-surface": "#1c1c17",
          "on-primary-fixed-variant": "#304e30",
          "tertiary-fixed-dim": "#b2ceb2",
          "on-primary": "#ffffff",
          "error-container": "#ffdad6",
          "surface-container-high": "#ebe8df",
          "inverse-primary": "#aecfa9",
          "on-tertiary": "#ffffff",
          "primary-container": "#2d4a2d",
          "on-tertiary-container": "#9db79d",
          "on-primary-container": "#98b994",
          "secondary-fixed": "#c7ecc5",
          "on-secondary-fixed-variant": "#2e4e31",
          "on-secondary-fixed": "#022109",
          "surface-bright": "#fcf9f0",
          "on-secondary-container": "#4a6a4b",
          "surface-container-highest": "#e5e2da",
          "surface-dim": "#dddad1",
          "on-tertiary-fixed-variant": "#354c37"
        },
        borderRadius: {
          "DEFAULT": "0.125rem",
          "lg": "0.25rem",
          "xl": "0.5rem",
          "full": "0.75rem"
        },
        fontFamily: {
          "headline": ["Newsreader", "serif"],
          "body": ["Inter", "sans-serif"],
          "label": ["Space Grotesk", "monospace"]
        }
      }
    }
  }
</script>
<style>
  /* ── Base ── */
  body { background-color: #fcf9f0; overflow: hidden; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }

  /* ── Layout shell ── */
  .app-shell {
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 220px 1fr;
    height: 100vh;
    width: 100vw;
  }

  /* ── Top nav ── */
  .top-nav {
    grid-column: 1 / -1;
    grid-row: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    background: rgba(252,249,240,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(195,200,190,0.25);
    z-index: 50;
  }

  /* ── Sidebar ── */
  .sidebar {
    grid-column: 1;
    grid-row: 2;
    background: #f6f3ea;
    border-right: 1px solid rgba(195,200,190,0.3);
    display: flex;
    flex-direction: column;
    padding: 2rem 0;
    overflow-y: auto;
  }

  .sidebar-label {
    font-family: 'Space Grotesk', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #737970;
    padding: 0 1.5rem 1rem;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    width: 100%;
    text-align: left;
    padding: 0.75rem 1.5rem;
    font-family: 'Space Grotesk', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    color: #434841;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }

  .sidebar-item:hover {
    background: rgba(195,200,190,0.2);
    color: #173318;
  }

  .sidebar-item.active {
    background: rgba(23,51,24,0.07);
    color: #173318;
    font-weight: 600;
  }

  .sidebar-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #173318;
  }

  .sidebar-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.4;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .sidebar-item.active .sidebar-dot {
    opacity: 1;
    background: #173318;
  }

  /* Node network decoration in sidebar */
  .sidebar-decoration {
    flex: 1;
    display: flex;
    align-items: flex-end;
    padding: 1.5rem;
    opacity: 0.45;
  }

  /* ── Main area ── */
  .main-area {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #fcf9f0;
    min-width: 0;
    width: 100%;
  }

  /* ── Tab bar ── */
  .tab-bar-wrapper {
    border-bottom: 1px solid rgba(195,200,190,0.3);
    background: #f6f3ea;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .tab-bar-wrapper::-webkit-scrollbar { height: 5px; }
  .tab-bar-wrapper::-webkit-scrollbar-track { background: rgba(195,200,190,0.15); }
  .tab-bar-wrapper::-webkit-scrollbar-thumb { background: rgba(69,102,71,0.45); border-radius: 3px; }
  .tab-bar-wrapper::-webkit-scrollbar-thumb:hover { background: rgba(23,51,24,0.65); }

  #tab-bar {
    display: flex;
    padding: 0 1.5rem;
    gap: 0;
    white-space: nowrap;
    min-width: max-content;
  }

  .tab-item {
    font-family: 'Space Grotesk', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.8rem 1.1rem;
    border: none;
    background: transparent;
    color: #737970;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .tab-item:hover { color: #173318; }

  .tab-item.active {
    color: #173318;
    border-bottom-color: #173318;
    font-weight: 600;
  }

  .tab-whitepaper {
    color: #456647;
    font-weight: 600;
  }

  .tab-whitepaper.active {
    color: #173318;
    border-bottom-color: #173318;
  }

  /* ── Content body ── */
  #content-body {
    flex: 1;
    overflow-y: auto;
    padding: 4rem 6rem 5rem 6rem;
    width: 100%;
    box-sizing: border-box;
  }

  .content-inner {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
  }

  #content-body::-webkit-scrollbar { width: 6px; }
  #content-body::-webkit-scrollbar-track { background: rgba(195,200,190,0.15); }
  #content-body::-webkit-scrollbar-thumb { background: rgba(69,102,71,0.45); border-radius: 3px; }
  #content-body::-webkit-scrollbar-thumb:hover { background: rgba(23,51,24,0.65); }

  /* ── Loading ── */
  .loading-pulse {
    font-family: 'Space Grotesk', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #737970;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* ── Markdown Styles ── */
  .md-h1 {
    font-family: 'Newsreader', serif;
    font-size: 2.5rem;
    color: #173318;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin: 0 0 1.5rem;
    font-weight: 400;
  }

  .md-h2 {
    font-family: 'Newsreader', serif;
    font-size: 1.6rem;
    color: #173318;
    margin: 2.5rem 0 0.75rem;
    font-weight: 400;
    font-style: italic;
    border-bottom: 1px solid rgba(195,200,190,0.25);
    padding-bottom: 0.5rem;
  }

  .md-h3 {
    font-family: 'Space Grotesk', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #456647;
    margin: 2rem 0 0.75rem;
  }

  .md-h4 {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: #173318;
    margin: 1.5rem 0 0.5rem;
  }

  .md-p {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    line-height: 1.75;
    color: #434841;
    margin: 0 0 1rem;
  }

  .md-p strong { color: #173318; }
  .md-p em { font-style: italic; color: #1b321f; }

  .md-hr {
    border: none;
    border-top: 1px solid rgba(195,200,190,0.3);
    margin: 2rem 0;
  }

  .md-blockquote {
    border-left: 2px solid #173318;
    padding: 0.75rem 1.25rem;
    margin: 1.5rem 0;
    background: rgba(23,51,24,0.03);
    font-family: 'Newsreader', serif;
    font-size: 1rem;
    font-style: italic;
    color: #1b321f;
    line-height: 1.65;
  }

  .md-ul, .md-ol {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    color: #434841;
    margin: 0.75rem 0 1rem 1.25rem;
    line-height: 1.75;
  }

  .md-ul li { list-style: disc; margin-bottom: 0.3rem; }
  .md-ol li { list-style: decimal; margin-bottom: 0.3rem; }
  .md-ul li strong, .md-ol li strong { color: #173318; }

  /* ── Tables ── */
  .table-wrapper {
    overflow-x: auto;
    margin: 1.5rem 0;
  }

  .md-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
  }

  .md-table th {
    background: #ebe8df;
    padding: 0.7rem 1rem;
    text-align: left;
    font-family: 'Space Grotesk', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #434841;
    font-weight: 600;
  }

  .md-table td {
    padding: 0.65rem 1rem;
    color: #434841;
    border-bottom: 1px solid rgba(195,200,190,0.2);
  }

  .md-table tr:hover td { background: rgba(241,238,229,0.6); }

  .md-table td strong { color: #173318; }

  /* ── Inline code ── */
  .inline-code {
    font-family: 'Space Grotesk', monospace;
    font-size: 0.78em;
    background: rgba(23,51,24,0.06);
    color: #1b321f;
    padding: 0.1em 0.35em;
    border-radius: 2px;
  }

  /* ── Collapsible ── */
  .collapse-trigger,
  .code-block-wrapper {
    margin: 1.5rem 0;
  }

  .collapse-btn {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: 'Space Grotesk', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #456647;
    background: rgba(23,51,24,0.04);
    border: 1px solid rgba(195,200,190,0.4);
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    width: 100%;
    text-align: left;
  }

  .collapse-btn:hover {
    background: rgba(23,51,24,0.08);
    color: #173318;
  }

  .collapse-icon {
    font-size: 0.6rem;
    transition: transform 0.15s;
    flex-shrink: 0;
  }

  .lang-tag {
    background: rgba(23,51,24,0.1);
    color: #173318;
    padding: 0.1em 0.4em;
    border-radius: 2px;
    font-size: 0.62rem;
  }

  .collapse-body {
    border: 1px solid rgba(195,200,190,0.3);
    border-top: none;
    background: #f6f3ea;
  }

  .collapse-hint {
    font-family: 'Space Grotesk', monospace;
    font-size: 0.72rem;
    color: #737970;
    padding: 0.75rem 1rem;
    margin: 0;
    font-style: italic;
  }

  /* ── Code block ── */
  .md-pre {
    margin: 0;
    overflow-x: auto;
    padding: 1.25rem 1.5rem;
    background: #1c1c17;
  }

  .md-pre::-webkit-scrollbar { height: 3px; }
  .md-pre::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

  .md-pre code {
    font-family: 'Space Grotesk', monospace;
    font-size: 0.78rem;
    color: #c7ecc5;
    line-height: 1.7;
    white-space: pre;
  }

  /* ── Error ── */
  .error-msg { color: #ba1a1a; }

  /* ── Node diagram background motif ── */
  .node-motif {
    background-image: radial-gradient(#173318 0.5px, transparent 0.5px);
    background-size: 24px 24px;
    mask-image: radial-gradient(circle at center, black, transparent 80%);
  }
</style>
</head>
<body class="text-on-surface font-body">

<div class="app-shell">

  <!-- ── Top Navigation ── -->
  <nav class="top-nav">
    <div class="flex items-center gap-6">
      <a href="code.html" class="flex items-center gap-3 group">
        <span class="material-symbols-outlined text-base text-secondary opacity-60 group-hover:opacity-100 transition-opacity">arrow_back</span>
        <span class="text-lg font-headline italic text-primary">OrganicFlow</span>
      </a>
      <div class="h-4 w-px bg-outline-variant/40"></div>
      <span class="font-label text-[10px] uppercase tracking-[0.25em] text-secondary">Technical Documentation</span>
    </div>

    <div class="hidden md:flex items-center gap-6">
      <span class="font-label text-[10px] uppercase tracking-widest text-outline">Whitepapers &amp; Tests</span>
      <div class="flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-secondary/60"></span>
        <span class="font-label text-[10px] text-secondary uppercase tracking-wider">v1.0</span>
      </div>
    </div>
  </nav>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <p class="sidebar-label">Topics</p>
    <nav id="sidebar-nav"></nav>

    <!-- Decorative node network -->
    <div class="sidebar-decoration">
      <svg width="180" height="130" viewBox="0 0 180 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- edges — solid -->
        <line x1="18" y1="65" x2="55" y2="28" stroke="#173318" stroke-width="1" opacity="0.6"/>
        <line x1="18" y1="65" x2="55" y2="95" stroke="#173318" stroke-width="1" opacity="0.6"/>
        <line x1="55" y1="28" x2="105" y2="18" stroke="#173318" stroke-width="1" opacity="0.55"/>
        <line x1="55" y1="28" x2="105" y2="52" stroke="#173318" stroke-width="1" opacity="0.55"/>
        <line x1="55" y1="95" x2="105" y2="88" stroke="#173318" stroke-width="1" opacity="0.55"/>
        <line x1="55" y1="95" x2="105" y2="112" stroke="#173318" stroke-width="1" opacity="0.5"/>
        <line x1="105" y1="52" x2="155" y2="38" stroke="#173318" stroke-width="1" opacity="0.55"/>
        <line x1="105" y1="52" x2="155" y2="72" stroke="#173318" stroke-width="1" opacity="0.55"/>
        <line x1="105" y1="88" x2="155" y2="72" stroke="#173318" stroke-width="1" opacity="0.5"/>
        <line x1="105" y1="88" x2="155" y2="108" stroke="#173318" stroke-width="1" opacity="0.45"/>
        <!-- edges — dashed cross-links -->
        <line x1="55" y1="28" x2="55" y2="95" stroke="#173318" stroke-width="0.7" opacity="0.3" stroke-dasharray="4 4"/>
        <line x1="105" y1="18" x2="105" y2="52" stroke="#173318" stroke-width="0.7" opacity="0.3" stroke-dasharray="4 4"/>
        <line x1="105" y1="52" x2="105" y2="88" stroke="#173318" stroke-width="0.7" opacity="0.25" stroke-dasharray="4 4"/>
        <line x1="155" y1="38" x2="155" y2="72" stroke="#173318" stroke-width="0.7" opacity="0.25" stroke-dasharray="4 4"/>
        <line x1="105" y1="18" x2="155" y2="38" stroke="#173318" stroke-width="0.7" opacity="0.3" stroke-dasharray="4 4"/>
        <!-- nodes -->
        <circle cx="18"  cy="65"  r="5.5" fill="#173318"/>
        <circle cx="55"  cy="28"  r="4"   fill="#173318"/>
        <circle cx="55"  cy="95"  r="4"   fill="#173318"/>
        <circle cx="105" cy="18"  r="3"   fill="#173318" opacity="0.6"/>
        <circle cx="105" cy="52"  r="6.5" fill="#173318"/>
        <circle cx="105" cy="88"  r="4.5" fill="#173318"/>
        <circle cx="105" cy="112" r="2.5" fill="#173318" opacity="0.5"/>
        <circle cx="155" cy="38"  r="3.5" fill="#173318"/>
        <circle cx="155" cy="72"  r="5"   fill="#173318"/>
        <circle cx="155" cy="108" r="2.5" fill="#173318" opacity="0.5"/>
      </svg>
    </div>
  </aside>

  <!-- ── Main area ── -->
  <main class="main-area">

    <!-- Tab bar -->
    <div class="tab-bar-wrapper">
      <div id="tab-bar"></div>
    </div>

    <!-- Content -->
    <div id="content-body"></div>

  </main>

</div>

<script src="js/dashboard.js"></script>
</body>
</html>
