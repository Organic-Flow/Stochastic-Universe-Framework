<style>
  /* ── Base ── */
  body { background-color: #fcf9f0; overflow: hidden; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }

  /* ── Layout shell ── */
  .app-shell {
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 240px 1fr;
    height: 100vh;
    width: 100vw;
  }

  /* ── Top nav ── */
  .top-nav {
    grid-column: 1 / -1;
    grid-row: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    background: rgba(252,249,240,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(195,200,190,0.25);
    z-index: 50;
  }

  /* ── Sidebar ── */
  .sidebar {
    grid-column: 1;
    grid-row: 2;
    background: #f6f3ea;
    border-right: 1px solid rgba(195,200,190,0.3);
    display: flex;
    flex-direction: column;
    padding: 2rem 0;
    overflow-y: auto;
  }

  .sidebar-label {
    font-family: 'Space Grotesk', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #737970;
    padding: 0 1.5rem 1rem;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    width: 100%;
    text-align: left;
    padding: 0.75rem 1.5rem;
    font-family: 'Space Grotesk', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    color: #434841;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }

  .sidebar-item:hover {
    background: rgba(195,200,190,0.2);
    color: #173318;
  }

  .sidebar-item.active {
    background: rgba(23,51,24,0.07);
    color: #173318;
    font-weight: 600;
  }

  .sidebar-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #173318;
  }

  .sidebar-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.4;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .sidebar-item.active .sidebar-dot {
    opacity: 1;
    background: #173318;
  }

  /* ── Main area ── */
  .main-area {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #fcf9f0;
    min-width: 0;
    width: 100%;
  }

  /* ── Tab bar ── */
  .tab-bar-wrapper {
    border-bottom: 1px solid rgba(195,200,190,0.3);
    background: #f6f3ea;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .tab-bar-wrapper::-webkit-scrollbar { height: 5px; }
  .tab-bar-wrapper::-webkit-scrollbar-track { background: rgba(195,200,190,0.15); }
  .tab-bar-wrapper::-webkit-scrollbar-thumb { background: rgba(69,102,71,0.45); border-radius: 3px; }
  .tab-bar-wrapper::-webkit-scrollbar-thumb:hover { background: rgba(23,51,24,0.65); }

  #tab-bar {
    display: flex;
    padding: 0 1.5rem;
    gap: 0;
    white-space: nowrap;
    min-width: max-content;
  }

  .tab-item {
    font-family: 'Space Grotesk', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.8rem 1.1rem;
    border: none;
    background: transparent;
    color: #737970;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .tab-item:hover { color: #173318; }

  .tab-item.active {
    color: #173318;
    border-bottom-color: #173318;
    font-weight: 600;
  }

  /* ── Content body ── */
  #content-body {
    flex: 1;
    overflow-y: auto;
    padding: 4rem 6rem 5rem 6rem;
    width: 100%;
    box-sizing: border-box;
  }

  .content-inner {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
  }

  #content-body::-webkit-scrollbar { width: 6px; }
  #content-body::-webkit-scrollbar-track { background: rgba(195,200,190,0.15); }
  #content-body::-webkit-scrollbar-thumb { background: rgba(69,102,71,0.45); border-radius: 3px; }
  #content-body::-webkit-scrollbar-thumb:hover { background: rgba(23,51,24,0.65); }

  /* ── Loading ── */
  .loading-pulse {
    font-family: 'Space Grotesk', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #737970;
    animation: pulse 1.5s ease-in-out infinite;
    padding: 2rem;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
</style>
</head>
<body class="text-on-surface font-body">

<div class="app-shell">

  <!-- ── Top Navigation ── -->
  <nav class="top-nav">
    <div class="flex items-center gap-6">
      <a href="index.html" class="flex items-center gap-3 group">
        <span class="material-symbols-outlined text-base text-secondary opacity-60 group-hover:opacity-100 transition-opacity">arrow_back</span>
        <span class="text-lg font-headline italic text-primary">Stochastic Universe</span>
      </a>
      <div class="h-4 w-px bg-outline-variant/40"></div>
      <span class="font-label text-[10px] uppercase tracking-[0.25em] text-secondary">Data Room & Analysis</span>
    </div>

    <div class="hidden md:flex items-center gap-6">
      <div class="flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-secondary/60"></span>
        <span class="font-label text-[10px] text-secondary uppercase tracking-wider">Research v1.0</span>
      </div>
    </div>
  </nav>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <p class="sidebar-label">Pillars</p>
    <nav id="sidebar-nav"></nav>
    
    <!-- Sidebar Decoration -->
    <div style="margin-top: auto; padding: 2rem; opacity: 0.35;">
      <svg width="180" height="130" viewBox="0 0 180 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="18" y1="65" x2="55" y2="28" stroke="#173318" stroke-width="1" opacity="0.6"/>
        <line x1="18" y1="65" x2="55" y2="95" stroke="#173318" stroke-width="1" opacity="0.6"/>
        <line x1="55" y1="28" x2="105" y2="18" stroke="#173318" stroke-width="1" opacity="0.55"/>
        <circle cx="18" cy="65" r="5.5" fill="#173318"/>
        <circle cx="55" cy="28" r="4" fill="#173318"/>
        <circle cx="55" cy="95" r="4" fill="#173318"/>
        <circle cx="105" cy="52" r="6.5" fill="#173318"/>
      </svg>
    </div>
  </aside>

  <!-- ── Main area ── -->
  <main class="main-area">
    <!-- Tab bar -->
    <div class="tab-bar-wrapper">
      <div id="tab-bar"></div>
    </div>
    <!-- Content -->
    <div id="content-body"></div>
  </main>

</div>

<script src="js/dashboard.js"></script>
</body>
</html>
